<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendário com Escala de Ministérios</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
      background: linear-gradient(145deg, #f0f4fa 0%, #dce4ef 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      margin: 0;
    }

    .app-container {
      max-width: 1100px;
      width: 100%;
      background: rgba(255, 255, 255, 0.65);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 48px;
      padding: 2rem 2rem 2.5rem;
      box-shadow: 0 30px 60px -20px rgba(0, 20, 40, 0.4), inset 0 0 0 1px rgba(255, 255, 255, 0.5);
      transition: all 0.2s;
    }

    h1 {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.8rem 1.2rem;
      font-weight: 600;
      color: #0b1f33;
      font-size: 2rem;
      letter-spacing: -0.3px;
      margin-bottom: 0.2rem;
    }

    .month-year-badge {
      background: #c9d8ec;
      padding: 0.3rem 1.6rem;
      border-radius: 60px;
      font-size: 1.3rem;
      font-weight: 500;
      color: #142d47;
      box-shadow: inset 0 1px 4px rgba(0,0,0,0.03);
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.8rem 1rem;
      margin: 0.8rem 0 1.2rem;
    }

    .nav-group {
      display: flex;
      gap: 0.5rem;
    }

    .nav-btn {
      background: rgba(210, 225, 245, 0.6);
      border: none;
      border-radius: 40px;
      width: 44px;
      height: 44px;
      font-size: 1.5rem;
      font-weight: 300;
      color: #1f3b5c;
      cursor: pointer;
      backdrop-filter: blur(4px);
      transition: 0.12s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 6px rgba(0,0,0,0.02);
    }

    .nav-btn:hover {
      background: #bed3ed;
      transform: scale(1.04);
      box-shadow: 0 4px 12px rgba(0, 20, 40, 0.08);
    }

    .today-btn {
      background: rgba(210, 225, 245, 0.5);
      border: none;
      padding: 0.4rem 1.6rem;
      border-radius: 60px;
      font-weight: 500;
      color: #1a3a5e;
      backdrop-filter: blur(4px);
      cursor: pointer;
      font-size: 0.9rem;
      border: 1px solid rgba(255,255,255,0.2);
      transition: 0.12s;
    }

    .today-btn:hover {
      background: #c3d8f0;
      transform: scale(1.02);
    }

    .edit-link-btn {
      background: #1d4b7c;
      color: white;
      border: none;
      padding: 0.4rem 1.6rem;
      border-radius: 60px;
      font-weight: 500;
      cursor: pointer;
      font-size: 0.9rem;
      transition: 0.12s;
      text-decoration: none;
      display: inline-block;
    }

    .edit-link-btn:hover {
      background: #2a5f94;
      transform: scale(1.02);
    }

    .week-header {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
      text-align: center;
      font-weight: 600;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: #1f3b5a;
      background: rgba(190, 210, 235, 0.2);
      padding: 0.5rem 0;
      border-radius: 60px;
      margin-bottom: 4px;
      backdrop-filter: blur(2px);
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
    }

    .day-card {
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(2px);
      border-radius: 20px;
      padding: 8px 4px 6px;
      min-height: 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      border: 1px solid rgba(255, 255, 255, 0.25);
      box-shadow: 0 1px 4px rgba(0,0,0,0.01);
      transition: all 0.1s;
      cursor: pointer;
      position: relative;
    }

    .day-card:hover {
      background: rgba(235, 244, 255, 0.7);
      border-color: rgba(60, 120, 200, 0.15);
      transform: scale(1.02);
      box-shadow: 0 6px 14px rgba(0, 30, 60, 0.06);
      z-index: 2;
    }

    .day-card.other-month {
      opacity: 0.45;
      background: rgba(230, 238, 250, 0.2);
    }

    .day-card.today {
      background: #1d4b7c;
      border-color: #1d4b7c;
      box-shadow: 0 8px 18px rgba(22, 78, 150, 0.2);
    }

    .day-card.today .day-number {
      color: white;
    }

    .day-card.today .ministry-badge {
      background: rgba(255, 255, 255, 0.15);
      color: #e3edff;
    }

    .day-number {
      font-weight: 600;
      font-size: 1.2rem;
      color: #10243c;
      line-height: 1.3;
      margin-bottom: 4px;
    }

    .ministry-badge {
      font-size: 0.55rem;
      background: rgba(60, 110, 180, 0.08);
      padding: 2px 8px;
      border-radius: 60px;
      color: #1e4068;
      max-width: 100%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-weight: 500;
      letter-spacing: 0.2px;
      border: 1px solid rgba(100, 150, 210, 0.08);
      margin-top: 2px;
      width: 100%;
      text-align: center;
    }

    .no-scale {
      font-size: 0.5rem;
      color: #7a90ac;
      opacity: 0.6;
      margin-top: 4px;
      font-weight: 400;
    }

    .day-card.today .no-scale {
      color: #b6d0ec;
    }

    .modal-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 10, 25, 0.5);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      padding: 20px;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .modal {
      background: white;
      border-radius: 40px;
      max-width: 640px;
      width: 100%;
      padding: 2rem 2rem 2.2rem;
      box-shadow: 0 40px 70px rgba(0, 0, 0, 0.2);
      transform: scale(0.96);
      transition: transform 0.2s ease;
      background: #f9fcff;
      border: 1px solid rgba(255,255,255,0.3);
    }

    .modal-overlay.active .modal {
      transform: scale(1);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.4rem;
      border-bottom: 1px solid #dae3f0;
      padding-bottom: 0.8rem;
    }

    .modal-header h2 {
      font-weight: 600;
      color: #0d263f;
      font-size: 1.6rem;
    }

    .modal-close {
      background: #eaf0f8;
      border: none;
      border-radius: 60px;
      width: 40px;
      height: 40px;
      font-size: 1.4rem;
      cursor: pointer;
      transition: 0.1s;
      color: #1a3a5e;
    }

    .modal-close:hover {
      background: #d1dff0;
    }

    .scale-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.95rem;
    }

    .scale-table td {
      padding: 10px 8px;
      border-bottom: 1px solid #e4ecf5;
      color: #1f3b5a;
    }

    .scale-table td:first-child {
      font-weight: 600;
      color: #0b2945;
      width: 38%;
    }

    .scale-table td:last-child {
      font-weight: 500;
      color: #1f3f62;
    }

    .scale-table tr:last-child td {
      border-bottom: none;
    }

    .empty-scale-msg {
      color: #6f8aa8;
      font-style: italic;
      padding: 1rem 0;
      text-align: center;
      background: #f0f5fc;
      border-radius: 30px;
    }

    .footer-note {
      margin-top: 1.8rem;
      display: flex;
      justify-content: space-between;
      color: #3b5b7a;
      font-size: 0.8rem;
      opacity: 0.7;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    @media (max-width: 600px) {
      .app-container { padding: 1.2rem; }
      .day-card { min-height: 70px; padding: 4px 2px; }
      .day-number { font-size: 1rem; }
      .ministry-badge { font-size: 0.45rem; padding: 1px 4px; }
      .modal { padding: 1.5rem; }
      .scale-table td { padding: 6px 4px; font-size: 0.8rem; }
      .week-header { font-size: 0.6rem; }
    }
  </style>
</head>
<body>
<div class="app-container">
  <h1>
    <span>📆 Calendário &  Escala -​ IASD Bom Jesus</span>
    <span class="month-year-badge" id="monthYearDisplay">Junho 2026</span>
  </h1>

  <div class="toolbar">
    <div class="nav-group">
      <button class="nav-btn" id="prevMonthBtn">◀</button>
      <button class="nav-btn" id="nextMonthBtn">▶</button>
    </div>
    <div style="display: flex; gap: 10px; flex-wrap: wrap;">
      <button class="today-btn" id="goTodayBtn">🗓 Hoje</button>
      
    </div>
  </div>

  <div class="week-header">
    <span>Dom</span><span>Seg</span><span>Ter</span><span>Qua</span>
    <span>Qui</span><span>Sex</span><span>Sáb</span>
  </div>

  <div class="calendar-grid" id="calendarGrid"></div>
  <div class="footer-note">
    <span>👆 Clique em qualquer dia para ver a escala</span>
    <span>📋 Dados salvos automaticamente</span>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalDateTitle">15 de Junho 2026</h2>
      <button class="modal-close" id="modalCloseBtn">✕</button>
    </div>
    <div id="modalBody">
      <!-- preenchido dinamicamente -->
    </div>
  </div>
</div>

<script>
  (function() {
    // --- Chave para localStorage ---
    const STORAGE_KEY = 'escala_ministerial_data';

    // --- Funções de persistência ---
    function loadScaleData() {
      try {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) {
          return JSON.parse(stored);
        }
      } catch (e) {
        console.error('Erro ao carregar dados:', e);
      }
      return null;
    }

    function saveScaleData(data) {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      } catch (e) {
        console.error('Erro ao salvar dados:', e);
      }
    }

    // --- DADOS DE ESCALA ---
    let scaleData = loadScaleData();

    // Se não houver dados salvos, gera os dados de exemplo
    if (!scaleData || Object.keys(scaleData).length === 0) {
      scaleData = {};
      const now = new Date();
      const year = now.getFullYear();
      const month = now.getMonth();

      function dateKey(y, m, d) {
        return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      }

      const sábados = [5, 12, 19, 26];
      const pregadores = ['Pr. Carlos Silva', 'Pr. Ana Lúcia', 'Pr. Roberto Mendes', 'Pr. Fernanda Costa'];
      const recepcao = ['Marcos e Lúcia', 'João e Marta', 'André e Paula', 'Sandra e Cláudio'];
      const diaconos = ['Diác. Ronaldo', 'Diác. Beatriz', 'Diác. Maurício', 'Diác. Elaine'];
      const escolaSab = ['Classe Jovens: Tiago', 'Classe Adultos: Sônia', 'Classe Intermediários: Rafael', 'Classe Infantil: Lígia'];
      const adoracaoInf = ['Tia Maria', 'Tia Helena', 'Tio Paulo', 'Tia Júlia'];

      sábados.forEach((day, idx) => {
        const key = dateKey(year, month, day);
        scaleData[key] = {
          data: `${day}/${month+1}/${year}`,
          canticos: `Cânticos: Hinário 234, 567`,
          sonoplastia: `Sonoplastia: Equipe Áudio (Carlos)`,
          pregador: `Pregador: ${pregadores[idx % pregadores.length]}`,
          recepcao: `Recepção: ${recepcao[idx % recepcao.length]}`,
          diaconos: `Diáconos: ${diaconos[idx % diaconos.length]}`,
          escola_sabatina: `Escola Sabatina: ${escolaSab[idx % escolaSab.length]}`,
          adoracao_infantil: `Adoração Infantil: ${adoracaoInf[idx % adoracaoInf.length]}`
        };
      });

      const domingos = [1, 8, 15, 22, 29];
      domingos.forEach((day, idx) => {
        const d = new Date(year, month, day);
        if (d.getDay() === 0) {
          const key = dateKey(year, month, day);
          if (!scaleData[key]) {
            scaleData[key] = {
              data: `${day}/${month+1}/${year}`,
              canticos: `Cânticos: Hinário 123, 456`,
              sonoplastia: `Sonoplastia: Equipe Domingos (Fábio)`,
              pregador: `Pregador: ${pregadores[(idx+2) % pregadores.length]}`,
              recepcao: `Recepção: ${recepcao[(idx+1) % recepcao.length]}`,
              diaconos: `Diáconos: ${diaconos[(idx+3) % diaconos.length]}`,
              escola_sabatina: `Escola Sabatina: Classe Unificada – ${escolaSab[idx % escolaSab.length]}`,
              adoracao_infantil: `Adoração Infantil: ${adoracaoInf[(idx+1) % adoracaoInf.length]}`
            };
          }
        }
      });

      saveScaleData(scaleData);
    }

    // Função auxiliar para gerar uma data string YYYY-MM-DD
    function dateKey(year, month, day) {
      return `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    }

    // --- estado da aplicação ---
    let currentDate = new Date();
    currentDate.setHours(0,0,0,0);
    let currentYear = currentDate.getFullYear();
    let currentMonth = currentDate.getMonth();

    // Elementos
    const gridEl = document.getElementById('calendarGrid');
    const monthYearDisplay = document.getElementById('monthYearDisplay');
    const modalOverlay = document.getElementById('modalOverlay');
    const modalDateTitle = document.getElementById('modalDateTitle');
    const modalBody = document.getElementById('modalBody');
    const modalCloseBtn = document.getElementById('modalCloseBtn');

    const prevBtn = document.getElementById('prevMonthBtn');
    const nextBtn = document.getElementById('nextMonthBtn');
    const goTodayBtn = document.getElementById('goTodayBtn');

    const monthNames = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

    // --- renderização do calendário ---
    function renderCalendar() {
      const year = currentYear;
      const month = currentMonth;

      const firstDay = new Date(year, month, 1);
      const lastDay = new Date(year, month + 1, 0);
      const daysInMonth = lastDay.getDate();
      const startWeekday = firstDay.getDay();

      const todayDate = new Date();
      todayDate.setHours(0,0,0,0);

      const totalCells = 42;
      let html = '';

      const prevMonthLastDay = new Date(year, month, 0).getDate();
      const prevMonth = month === 0 ? 11 : month - 1;
      const prevMonthYear = month === 0 ? year - 1 : year;

      for (let i = 0; i < totalCells; i++) {
        let dayNumber, cellMonth, cellYear;
        let isToday = false;
        let isOtherMonth = false;

        if (i < startWeekday) {
          const offset = startWeekday - i;
          dayNumber = prevMonthLastDay - offset + 1;
          cellMonth = prevMonth;
          cellYear = prevMonthYear;
          isOtherMonth = true;
        } else if (i >= startWeekday + daysInMonth) {
          const offset = i - (startWeekday + daysInMonth);
          dayNumber = offset + 1;
          cellMonth = month === 11 ? 0 : month + 1;
          cellYear = month === 11 ? year + 1 : year;
          isOtherMonth = true;
        } else {
          dayNumber = i - startWeekday + 1;
          cellMonth = month;
          cellYear = year;
          const cellDate = new Date(cellYear, cellMonth, dayNumber);
          if (cellDate.getTime() === todayDate.getTime()) {
            isToday = true;
          }
        }

        const key = dateKey(cellYear, cellMonth, dayNumber);
        const scale = scaleData[key] || null;

        let scaleHtml = '';
        if (scale) {
          let preg = scale.pregador || '';
          if (preg.length > 20) preg = preg.substring(0,18)+'…';
          scaleHtml = `<div class="ministry-badge">${preg || '📋 Escala'}</div>`;
        } else {
          scaleHtml = `<div class="no-scale">—</div>`;
        }

        let classes = 'day-card';
        if (isToday) classes += ' today';
        if (isOtherMonth) classes += ' other-month';

        const dataAttr = `${cellYear}-${String(cellMonth+1).padStart(2,'0')}-${String(dayNumber).padStart(2,'0')}`;

        html += `
          <div class="${classes}" data-date="${dataAttr}" data-key="${key}">
            <div class="day-number">${dayNumber}</div>
            ${scaleHtml}
          </div>
        `;
      }

      gridEl.innerHTML = html;
      monthYearDisplay.textContent = `${monthNames[month]} ${year}`;

      document.querySelectorAll('.day-card').forEach(card => {
        card.addEventListener('click', function(e) {
          const key = this.dataset.key;
          const dateStr = this.dataset.date;
          if (dateStr) {
            const parts = dateStr.split('-');
            const y = parseInt(parts[0]);
            const m = parseInt(parts[1]) - 1;
            const d = parseInt(parts[2]);
            openModal(y, m, d);
          }
        });
      });
    }

    // --- Modal ---
    function openModal(year, month, day) {
      const dateObj = new Date(year, month, day);
      const title = `${day} de ${monthNames[month]} ${year}`;
      modalDateTitle.textContent = title;

      const key = dateKey(year, month, day);
      const scale = scaleData[key];

      let html = '';
      if (scale) {
        html = `
          <table class="scale-table">
            <tr><td>📅 DATA</td><td>${scale.data || key}</td></tr>
            <tr><td>🎵 CÂNTICOS</td><td>${scale.canticos || '—'}</td></tr>
            <tr><td>🎛️ SONOPLASTIA</td><td>${scale.sonoplastia || '—'}</td></tr>
            <tr><td>📖 PREGADOR</td><td>${scale.pregador || '—'}</td></tr>
            <tr><td>🤝 RECEPÇÃO</td><td>${scale.recepcao || '—'}</td></tr>
            <tr><td>🕊️ DIÁCONOS</td><td>${scale.diaconos || '—'}</td></tr>
            <tr><td>📘 ESCOLA SABATINA</td><td>${scale.escola_sabatina || '—'}</td></tr>
            <tr><td>🧸 ADORAÇÃO INFANTIL</td><td>${scale.adoracao_infantil || '—'}</td></tr>
          </table>
        `;
      } else {
        html = `<div class="empty-scale-msg">📭 Nenhuma escala registrada para este dia.</div>`;
      }

      modalBody.innerHTML = html;
      modalOverlay.classList.add('active');
    }

    function closeModal() {
      modalOverlay.classList.remove('active');
    }

    // --- navegação ---
    function goToPrevMonth() {
      if (currentMonth === 0) {
        currentMonth = 11;
        currentYear--;
      } else {
        currentMonth--;
      }
      renderCalendar();
    }

    function goToNextMonth() {
      if (currentMonth === 11) {
        currentMonth = 0;
        currentYear++;
      } else {
        currentMonth++;
      }
      renderCalendar();
    }

    function goToToday() {
      const now = new Date();
      currentYear = now.getFullYear();
      currentMonth = now.getMonth();
      renderCalendar();
    }

    // --- eventos ---
    prevBtn.addEventListener('click', goToPrevMonth);
    nextBtn.addEventListener('click', goToNextMonth);
    goTodayBtn.addEventListener('click', goToToday);
    modalCloseBtn.addEventListener('click', closeModal);
    modalOverlay.addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && modalOverlay.classList.contains('active')) {
        closeModal();
      }
      if (e.key === 'ArrowLeft' && !modalOverlay.classList.contains('active')) {
        e.preventDefault();
        goToPrevMonth();
      }
      if (e.key === 'ArrowRight' && !modalOverlay.classList.contains('active')) {
        e.preventDefault();
        goToNextMonth();
      }
    });

    // Inicializa
    const now = new Date();
    currentYear = now.getFullYear();
    currentMonth = now.getMonth();
    renderCalendar();

  })();
</script>
</body>
</html>
