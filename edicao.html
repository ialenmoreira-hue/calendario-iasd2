<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editar Escala - Administração</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
      background: linear-gradient(145deg, #f0f4fa 0%, #dce4ef 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      margin: 0;
    }

    .app-container {
      max-width: 1100px;
      width: 100%;
      background: rgba(255, 255, 255, 0.65);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 48px;
      padding: 2rem 2rem 2.5rem;
      box-shadow: 0 30px 60px -20px rgba(0, 20, 40, 0.4), inset 0 0 0 1px rgba(255, 255, 255, 0.5);
      transition: all 0.2s;
    }

    h1 {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.8rem 1.2rem;
      font-weight: 600;
      color: #0b1f33;
      font-size: 2rem;
      letter-spacing: -0.3px;
      margin-bottom: 0.2rem;
    }

    .month-year-badge {
      background: #c9d8ec;
      padding: 0.3rem 1.6rem;
      border-radius: 60px;
      font-size: 1.3rem;
      font-weight: 500;
      color: #142d47;
      box-shadow: inset 0 1px 4px rgba(0,0,0,0.03);
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.8rem 1rem;
      margin: 0.8rem 0 1.2rem;
    }

    .nav-group {
      display: flex;
      gap: 0.5rem;
    }

    .nav-btn {
      background: rgba(210, 225, 245, 0.6);
      border: none;
      border-radius: 40px;
      width: 44px;
      height: 44px;
      font-size: 1.5rem;
      font-weight: 300;
      color: #1f3b5c;
      cursor: pointer;
      backdrop-filter: blur(4px);
      transition: 0.12s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 6px rgba(0,0,0,0.02);
    }

    .nav-btn:hover {
      background: #bed3ed;
      transform: scale(1.04);
      box-shadow: 0 4px 12px rgba(0, 20, 40, 0.08);
    }

    .today-btn {
      background: rgba(210, 225, 245, 0.5);
      border: none;
      padding: 0.4rem 1.6rem;
      border-radius: 60px;
      font-weight: 500;
      color: #1a3a5e;
      backdrop-filter: blur(4px);
      cursor: pointer;
      font-size: 0.9rem;
      border: 1px solid rgba(255,255,255,0.2);
      transition: 0.12s;
    }

    .today-btn:hover {
      background: #c3d8f0;
      transform: scale(1.02);
    }

    .view-link-btn {
      background: #6f8aa8;
      color: white;
      border: none;
      padding: 0.4rem 1.6rem;
      border-radius: 60px;
      font-weight: 500;
      cursor: pointer;
      font-size: 0.9rem;
      transition: 0.12s;
      text-decoration: none;
      display: inline-block;
    }

    .view-link-btn:hover {
      background: #5a7390;
      transform: scale(1.02);
    }

    .lock-status {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.85rem;
      color: #2b4a6a;
      background: rgba(200, 215, 235, 0.3);
      padding: 0.3rem 1.2rem 0.3rem 1rem;
      border-radius: 60px;
      backdrop-filter: blur(2px);
    }

    .lock-btn {
      background: none;
      border: none;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 40px;
      transition: 0.1s;
      color: #1f3b5c;
    }

    .lock-btn:hover {
      background: rgba(255,255,255,0.3);
    }

    .lock-btn.unlocked {
      color: #1d7c3e;
    }

    .week-header {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
      text-align: center;
      font-weight: 600;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: #1f3b5a;
      background: rgba(190, 210, 235, 0.2);
      padding: 0.5rem 0;
      border-radius: 60px;
      margin-bottom: 4px;
      backdrop-filter: blur(2px);
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
    }

    .day-card {
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(2px);
      border-radius: 20px;
      padding: 8px 4px 6px;
      min-height: 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      border: 1px solid rgba(255, 255, 255, 0.25);
      box-shadow: 0 1px 4px rgba(0,0,0,0.01);
      transition: all 0.1s;
      cursor: pointer;
      position: relative;
    }

    .day-card:hover {
      background: rgba(235, 244, 255, 0.7);
      border-color: rgba(60, 120, 200, 0.15);
      transform: scale(1.02);
      box-shadow: 0 6px 14px rgba(0, 30, 60, 0.06);
      z-index: 2;
    }

    .day-card.other-month {
      opacity: 0.45;
      background: rgba(230, 238, 250, 0.2);
    }

    .day-card.today {
      background: #1d4b7c;
      border-color: #1d4b7c;
      box-shadow: 0 8px 18px rgba(22, 78, 150, 0.2);
    }

    .day-card.today .day-number {
      color: white;
    }

    .day-card.today .ministry-badge {
      background: rgba(255, 255, 255, 0.15);
      color: #e3edff;
    }

    .day-number {
      font-weight: 600;
      font-size: 1.2rem;
      color: #10243c;
      line-height: 1.3;
      margin-bottom: 4px;
    }

    .ministry-badge {
      font-size: 0.55rem;
      background: rgba(60, 110, 180, 0.08);
      padding: 2px 8px;
      border-radius: 60px;
      color: #1e4068;
      max-width: 100%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-weight: 500;
      letter-spacing: 0.2px;
      border: 1px solid rgba(100, 150, 210, 0.08);
      margin-top: 2px;
      width: 100%;
      text-align: center;
    }

    .no-scale {
      font-size: 0.5rem;
      color: #7a90ac;
      opacity: 0.6;
      margin-top: 4px;
      font-weight: 400;
    }

    .day-card.today .no-scale {
      color: #b6d0ec;
    }

    .lock-icon-card {
      position: absolute;
      top: 2px;
      right: 4px;
      font-size: 0.5rem;
      opacity: 0.4;
    }

    .modal-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 10, 25, 0.5);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      padding: 20px;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .modal {
      background: white;
      border-radius: 40px;
      max-width: 680px;
      width: 100%;
      padding: 2rem 2rem 2.2rem;
      box-shadow: 0 40px 70px rgba(0, 0, 0, 0.2);
      transform: scale(0.96);
      transition: transform 0.2s ease;
      background: #f9fcff;
      border: 1px solid rgba(255,255,255,0.3);
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-overlay.active .modal {
      transform: scale(1);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.4rem;
      border-bottom: 1px solid #dae3f0;
      padding-bottom: 0.8rem;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .modal-header h2 {
      font-weight: 600;
      color: #0d263f;
      font-size: 1.6rem;
    }

    .modal-close {
      background: #eaf0f8;
      border: none;
      border-radius: 60px;
      width: 40px;
      height: 40px;
      font-size: 1.4rem;
      cursor: pointer;
      transition: 0.1s;
      color: #1a3a5e;
    }

    .modal-close:hover {
      background: #d1dff0;
    }

    .scale-form {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .form-group label {
      font-weight: 600;
      font-size: 0.85rem;
      color: #1f3b5a;
      letter-spacing: 0.3px;
    }

    .form-group input, .form-group textarea {
      padding: 10px 14px;
      border-radius: 20px;
      border: 1px solid #d8e2f0;
      background: white;
      font-size: 0.95rem;
      transition: 0.12s;
      font-family: inherit;
      width: 100%;
    }

    .form-group input:focus, .form-group textarea:focus {
      outline: none;
      border-color: #4a8bc2;
      box-shadow: 0 0 0 3px rgba(74, 139, 194, 0.15);
    }

    .form-group input[readonly] {
      background: #f0f4fa;
      cursor: default;
    }

    .form-actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      margin-top: 16px;
      border-top: 1px solid #e4ecf5;
      padding-top: 18px;
    }

    .btn-save {
      background: #1d4b7c;
      color: white;
      border: none;
      padding: 10px 28px;
      border-radius: 60px;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: 0.12s;
    }

    .btn-save:hover {
      background: #2a5f94;
      transform: scale(1.02);
    }

    .btn-delete {
      background: #e8edf5;
      color: #3b5b7a;
      border: none;
      padding: 10px 24px;
      border-radius: 60px;
      font-weight: 500;
      font-size: 0.95rem;
      cursor: pointer;
      transition: 0.12s;
    }

    .btn-delete:hover {
      background: #d5dde9;
    }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #1d3b5a;
      color: white;
      padding: 12px 28px;
      border-radius: 60px;
      font-weight: 500;
      box-shadow: 0 12px 30px rgba(0,0,0,0.15);
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 1000;
      font-size: 0.95rem;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .password-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 10, 25, 0.6);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
      padding: 20px;
    }

    .password-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    .password-box {
      background: white;
      border-radius: 40px;
      padding: 2.5rem 2.5rem 2.8rem;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 40px 70px rgba(0,0,0,0.2);
      transform: scale(0.95);
      transition: transform 0.2s ease;
    }

    .password-overlay.active .password-box {
      transform: scale(1);
    }

    .password-box h3 {
      font-size: 1.4rem;
      color: #0b1f33;
      margin-bottom: 0.5rem;
    }

    .password-box p {
      color: #3b5b7a;
      margin-bottom: 1.5rem;
      font-size: 0.95rem;
    }

    .password-box input {
      width: 100%;
      padding: 14px 18px;
      border-radius: 60px;
      border: 1px solid #d8e2f0;
      font-size: 1rem;
      margin-bottom: 1.2rem;
      text-align: center;
      letter-spacing: 2px;
    }

    .password-box input:focus {
      outline: none;
      border-color: #4a8bc2;
      box-shadow: 0 0 0 3px rgba(74, 139, 194, 0.15);
    }

    .password-box .pass-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    .password-box .pass-actions button {
      padding: 10px 28px;
      border-radius: 60px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      transition: 0.1s;
      font-size: 0.95rem;
    }

    .password-box .pass-actions .pass-confirm {
      background: #1d4b7c;
      color: white;
    }

    .password-box .pass-actions .pass-confirm:hover {
      background: #2a5f94;
    }

    .password-box .pass-actions .pass-cancel {
      background: #eaf0f8;
      color: #1f3b5a;
    }

    .password-box .pass-actions .pass-cancel:hover {
      background: #d5dde9;
    }

    .password-error {
      color: #c0392b;
      font-size: 0.85rem;
      margin-top: -0.5rem;
      margin-bottom: 0.8rem;
      display: none;
    }

    .password-error.show {
      display: block;
    }

    .footer-note {
      margin-top: 1.8rem;
      display: flex;
      justify-content: space-between;
      color: #3b5b7a;
      font-size: 0.8rem;
      opacity: 0.7;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    @media (max-width: 600px) {
      .app-container { padding: 1.2rem; }
      .day-card { min-height: 70px; padding: 4px 2px; }
      .day-number { font-size: 1rem; }
      .ministry-badge { font-size: 0.45rem; padding: 1px 4px; }
      .modal { padding: 1.5rem; }
      .form-group input, .form-group textarea { font-size: 0.85rem; padding: 8px 12px; }
      .week-header { font-size: 0.6rem; }
      .password-box { padding: 2rem 1.5rem; }
      .lock-status { font-size: 0.7rem; padding: 0.2rem 0.8rem; }
    }
  </style>
</head>
<body>
<div class="app-container">
  <h1>
    <span>✏️ Editar Escala</span>
    <span class="month-year-badge" id="monthYearDisplay">Junho 2026</span>
  </h1>

  <div class="toolbar">
    <div class="nav-group">
      <button class="nav-btn" id="prevMonthBtn">◀</button>
      <button class="nav-btn" id="nextMonthBtn">▶</button>
    </div>
    <div style="display: flex; gap: 10px; flex-wrap: wrap; align-items: center;">
      <button class="today-btn" id="goTodayBtn">🗓 Hoje</button>
      <a href="calendario.html" class="view-link-btn">👁️ Ver Calendário</a>
      <div class="lock-status" id="lockStatus">
        <span id="lockIcon">🔒</span>
        <span id="lockText">Protegido</span>
        <button class="lock-btn" id="toggleLockBtn" title="Clique para desbloquear edição">🔑</button>
      </div>
    </div>
  </div>

  <div class="week-header">
    <span>Dom</span><span>Seg</span><span>Ter</span><span>Qua</span>
    <span>Qui</span><span>Sex</span><span>Sáb</span>
  </div>

  <div class="calendar-grid" id="calendarGrid"></div>
  <div class="footer-note">
    <span>👆 Clique em um dia para editar a escala</span>
    <span id="editHint" style="opacity:0.6;">🔒 Edição bloqueada</span>
  </div>
</div>

<!-- Modal de edição -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalDateTitle">15 de Junho 2026</h2>
      <button class="modal-close" id="modalCloseBtn">✕</button>
    </div>
    <form class="scale-form" id="scaleForm">
      <div class="form-group">
        <label for="editData">📅 DATA</label>
        <input type="text" id="editData" readonly>
      </div>
      <div class="form-group">
        <label for="editCanticos">🎵 CÂNTICOS</label>
        <input type="text" id="editCanticos" placeholder="Ex: Hinário 234, 567">
      </div>
      <div class="form-group">
        <label for="editSonoplastia">🎛️ SONOPLASTIA</label>
        <input type="text" id="editSonoplastia" placeholder="Ex: Equipe Áudio (Carlos)">
      </div>
      <div class="form-group">
        <label for="editPregador">📖 PREGADOR</label>
        <input type="text" id="editPregador" placeholder="Ex: Pr. Carlos Silva">
      </div>
      <div class="form-group">
        <label for="editRecepcao">🤝 RECEPÇÃO</label>
        <input type="text" id="editRecepcao" placeholder="Ex: Marcos e Lúcia">
      </div>
      <div class="form-group">
        <label for="editDiaconos">🕊️ DIÁCONOS</label>
        <input type="text" id="editDiaconos" placeholder="Ex: Diác. Ronaldo">
      </div>
      <div class="form-group">
        <label for="editEscolaSabatina">📘 ESCOLA SABATINA</label>
        <input type="text" id="editEscolaSabatina" placeholder="Ex: Classe Jovens: Tiago">
      </div>
      <div class="form-group">
        <label for="editAdoracaoInfantil">🧸 ADORAÇÃO INFANTIL</label>
        <input type="text" id="editAdoracaoInfantil" placeholder="Ex: Tia Maria">
      </div>
      <div class="form-actions">
        <button type="button" class="btn-delete" id="deleteScaleBtn">🗑️ Remover</button>
        <button type="submit" class="btn-save">💾 Salvar Escala</button>
      </div>
    </form>
  </div>
</div>

<!-- Overlay de senha -->
<div class="password-overlay" id="passwordOverlay">
  <div class="password-box">
    <h3>🔐 Acesso restrito</h3>
    <p>Digite a senha para editar as escalas</p>
    <input type="password" id="passwordInput" placeholder="••••••••" maxlength="20" autocomplete="off">
    <div class="password-error" id="passwordError">Senha incorreta. Tente novamente.</div>
    <div class="pass-actions">
      <button class="pass-cancel" id="passCancel">Cancelar</button>
      <button class="pass-confirm" id="passConfirm">Confirmar</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  (function() {
    // --- CONFIGURAÇÃO ---
    const SENHA_ADMIN = 'admin123'; // Altere esta senha conforme desejado
    const STORAGE_KEY = 'escala_ministerial_data';

    // --- Funções de persistência ---
    function loadScaleData() {
      try {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) {
          return JSON.parse(stored);
        }
      } catch (e) {
        console.error('Erro ao carregar dados:', e);
      }
      return null;
    }

    function saveScaleData(data) {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      } catch (e) {
        console.error('Erro ao salvar dados:', e);
      }
    }

    // --- DADOS DE ESCALA ---
    let scaleData = loadScaleData();

    // Se não houver dados salvos, gera os dados de exemplo
    if (!scaleData || Object.keys(scaleData).length === 0) {
      scaleData = {};
      const now = new Date();
      const year = now.getFullYear();
      const month = now.getMonth();

      function dateKey(y, m, d) {
        return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      }

      const sábados = [5, 12, 19, 26];
      const pregadores = ['Pr. Carlos Silva', 'Pr. Ana Lúcia', 'Pr. Roberto Mendes', 'Pr. Fernanda Costa'];
      const recepcao = ['Marcos e Lúcia', 'João e Marta', 'André e Paula', 'Sandra e Cláudio'];
      const diaconos = ['Diác. Ronaldo', 'Diác. Beatriz', 'Diác. Maurício', 'Diác. Elaine'];
      const escolaSab = ['Classe Jovens: Tiago', 'Classe Adultos: Sônia', 'Classe Intermediários: Rafael', 'Classe Infantil: Lígia'];
      const adoracaoInf = ['Tia Maria', 'Tia Helena', 'Tio Paulo', 'Tia Júlia'];

      sábados.forEach((day, idx) => {
        const key = dateKey(year, month, day);
        scaleData[key] = {
          data: `${day}/${month+1}/${year}`,
          canticos: `Cânticos: Hinário 234, 567`,
          sonoplastia: `Sonoplastia: Equipe Áudio (Carlos)`,
          pregador: `Pregador: ${pregadores[idx % pregadores.length]}`,
          recepcao: `Recepção: ${recepcao[idx % recepcao.length]}`,
          diaconos: `Diáconos: ${diaconos[idx % diaconos.length]}`,
          escola_sabatina: `Escola Sabatina: ${escolaSab[idx % escolaSab.length]}`,
          adoracao_infantil: `Adoração Infantil: ${adoracaoInf[idx % adoracaoInf.length]}`
        };
      });

      const domingos = [1, 8, 15, 22, 29];
      domingos.forEach((day, idx) => {
        const d = new Date(year, month, day);
        if (d.getDay() === 0) {
          const key = dateKey(year, month, day);
          if (!scaleData[key]) {
            scaleData[key] = {
              data: `${day}/${month+1}/${year}`,
              canticos: `Cânticos: Hinário 123, 456`,
              sonoplastia: `Sonoplastia: Equipe Domingos (Fábio)`,
              pregador: `Pregador: ${pregadores[(idx+2) % pregadores.length]}`,
              recepcao: `Recepção: ${recepcao[(idx+1) % recepcao.length]}`,
              diaconos: `Diáconos: ${diaconos[(idx+3) % diaconos.length]}`,
              escola_sabatina: `Escola Sabatina: Classe Unificada – ${escolaSab[idx % escolaSab.length]}`,
              adoracao_infantil: `Adoração Infantil: ${adoracaoInf[(idx+1) % adoracaoInf.length]}`
            };
          }
        }
      });

      saveScaleData(scaleData);
    }

    function dateKey(year, month, day) {
      return `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    }

    // --- ESTADO ---
    let currentYear = new Date().getFullYear();
    let currentMonth = new Date().getMonth();
    let isUnlocked = false;
    let currentEditingKey = null;

    // Elementos DOM
    const gridEl = document.getElementById('calendarGrid');
    const monthYearDisplay = document.getElementById('monthYearDisplay');
    const modalOverlay = document.getElementById('modalOverlay');
    const modalDateTitle = document.getElementById('modalDateTitle');
    const modalCloseBtn = document.getElementById('modalCloseBtn');
    const scaleForm = document.getElementById('scaleForm');
    const toast = document.getElementById('toast');
    const lockIcon = document.getElementById('lockIcon');
    const lockText = document.getElementById('lockText');
    const toggleLockBtn = document.getElementById('toggleLockBtn');
    const editHint = document.getElementById('editHint');

    // Elementos senha
    const passwordOverlay = document.getElementById('passwordOverlay');
    const passwordInput = document.getElementById('passwordInput');
    const passwordError = document.getElementById('passwordError');
    const passConfirm = document.getElementById('passConfirm');
    const passCancel = document.getElementById('passCancel');

    // Campos do formulário
    const editData = document.getElementById('editData');
    const editCanticos = document.getElementById('editCanticos');
    const editSonoplastia = document.getElementById('editSonoplastia');
    const editPregador = document.getElementById('editPregador');
    const editRecepcao = document.getElementById('editRecepcao');
    const editDiaconos = document.getElementById('editDiaconos');
    const editEscolaSabatina = document.getElementById('editEscolaSabatina');
    const editAdoracaoInfantil = document.getElementById('editAdoracaoInfantil');
    const deleteScaleBtn = document.getElementById('deleteScaleBtn');

    const prevBtn = document.getElementById('prevMonthBtn');
    const nextBtn = document.getElementById('nextMonthBtn');
    const goTodayBtn = document.getElementById('goTodayBtn');

    const monthNames = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

    // --- Toast ---
    let toastTimer = null;
    function showToast(message) {
      toast.textContent = message;
      toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        toast.classList.remove('show');
      }, 2500);
    }

    // --- Atualizar status de bloqueio ---
    function updateLockUI() {
      if (isUnlocked) {
        lockIcon.textContent = '🔓';
        lockText.textContent = 'Editável';
        toggleLockBtn.textContent = '🔒';
        toggleLockBtn.classList.add('unlocked');
        editHint.textContent = '✏️ Edição liberada';
        editHint.style.opacity = '1';
      } else {
        lockIcon.textContent = '🔒';
        lockText.textContent = 'Protegido';
        toggleLockBtn.textContent = '🔑';
        toggleLockBtn.classList.remove('unlocked');
        editHint.textContent = '🔒 Edição bloqueada';
        editHint.style.opacity = '0.6';
      }
    }

    // --- Renderização do calendário ---
    function renderCalendar() {
      const year = currentYear;
      const month = currentMonth;

      const firstDay = new Date(year, month, 1);
      const lastDay = new Date(year, month + 1, 0);
      const daysInMonth = lastDay.getDate();
      const startWeekday = firstDay.getDay();

      const todayDate = new Date();
      todayDate.setHours(0,0,0,0);

      const totalCells = 42;
      let html = '';

      const prevMonthLastDay = new Date(year, month, 0).getDate();
      const prevMonth = month === 0 ? 11 : month - 1;
      const prevMonthYear = month === 0 ? year - 1 : year;

      for (let i = 0; i < totalCells; i++) {
        let dayNumber, cellMonth, cellYear;
        let isToday = false;
        let isOtherMonth = false;

        if (i < startWeekday) {
          const offset = startWeekday - i;
          dayNumber = prevMonthLastDay - offset + 1;
          cellMonth = prevMonth;
          cellYear = prevMonthYear;
          isOtherMonth = true;
        } else if (i >= startWeekday + daysInMonth) {
          const offset = i - (startWeekday + daysInMonth);
          dayNumber = offset + 1;
          cellMonth = month === 11 ? 0 : month + 1;
          cellYear = month === 11 ? year + 1 : year;
          isOtherMonth = true;
        } else {
          dayNumber = i - startWeekday + 1;
          cellMonth = month;
          cellYear = year;
          const cellDate = new Date(cellYear, cellMonth, dayNumber);
          if (cellDate.getTime() === todayDate.getTime()) {
            isToday = true;
          }
        }

        const key = dateKey(cellYear, cellMonth, dayNumber);
        const scale = scaleData[key] || null;

        let scaleHtml = '';
        if (scale) {
          let preg = scale.pregador || '';
          if (preg.length > 20) preg = preg.substring(0,18)+'…';
          scaleHtml = `<div class="ministry-badge">${preg || '📋 Escala'}</div>`;
        } else {
          scaleHtml = `<div class="no-scale">—</div>`;
        }

        let classes = 'day-card';
        if (isToday) classes += ' today';
        if (isOtherMonth) classes += ' other-month';

        const dataAttr = `${cellYear}-${String(cellMonth+1).padStart(2,'0')}-${String(dayNumber).padStart(2,'0')}`;

        html += `
          <div class="${classes}" data-date="${dataAttr}" data-key="${key}">
            <div class="day-number">${dayNumber}</div>
            ${scaleHtml}
            <div class="lock-icon-card">${isUnlocked ? '✏️' : '👁️'}</div>
          </div>
        `;
      }

      gridEl.innerHTML = html;
      monthYearDisplay.textContent = `${monthNames[month]} ${year}`;

      document.querySelectorAll('.day-card').forEach(card => {
        card.addEventListener('click', function() {
          const key = this.dataset.key;
          if (key) {
            if (isUnlocked) {
              openEditModal(key);
            } else {
              showToast('🔒 Desbloqueie a edição primeiro (clique no cadeado)');
            }
          }
        });
      });
    }

    // --- Abrir modal de edição ---
    function openEditModal(key) {
      if (!isUnlocked) {
        showToast('🔒 Desbloqueie a edição primeiro');
        return;
      }

      currentEditingKey = key;
      const [year, month, day] = key.split('-').map(Number);
      const title = `${day} de ${monthNames[month-1]} ${year}`;
      modalDateTitle.textContent = title;
      editData.value = `${day}/${month}/${year}`;

      const scale = scaleData[key] || null;
      if (scale) {
        editCanticos.value = scale.canticos || '';
        editSonoplastia.value = scale.sonoplastia || '';
        editPregador.value = scale.pregador || '';
        editRecepcao.value = scale.recepcao || '';
        editDiaconos.value = scale.diaconos || '';
        editEscolaSabatina.value = scale.escola_sabatina || '';
        editAdoracaoInfantil.value = scale.adoracao_infantil || '';
      } else {
        editCanticos.value = '';
        editSonoplastia.value = '';
        editPregador.value = '';
        editRecepcao.value = '';
        editDiaconos.value = '';
        editEscolaSabatina.value = '';
        editAdoracaoInfantil.value = '';
      }

      modalOverlay.classList.add('active');
    }

    function closeModal() {
      modalOverlay.classList.remove('active');
      currentEditingKey = null;
    }

    // --- Salvar escala ---
    function saveScale(e) {
      e.preventDefault();
      if (!currentEditingKey) {
        showToast('Erro: nenhum dia selecionado');
        return;
      }

      const key = currentEditingKey;
      const [year, month, day] = key.split('-').map(Number);
      const dataStr = `${day}/${month}/${year}`;

      const newScale = {
        data: dataStr,
        canticos: editCanticos.value.trim() || '',
        sonoplastia: editSonoplastia.value.trim() || '',
        pregador: editPregador.value.trim() || '',
        recepcao: editRecepcao.value.trim() || '',
        diaconos: editDiaconos.value.trim() || '',
        escola_sabatina: editEscolaSabatina.value.trim() || '',
        adoracao_infantil: editAdoracaoInfantil.value.trim() || ''
      };

      const hasContent = Object.values(newScale).some(val => val !== '' && val !== dataStr);
      if (!hasContent) {
        delete scaleData[key];
        showToast('🗑️ Escala removida');
      } else {
        scaleData[key] = newScale;
        showToast('✅ Escala salva com sucesso!');
      }

      saveScaleData(scaleData);
      closeModal();
      renderCalendar();
    }

    // --- Remover escala ---
    function deleteScale() {
      if (!currentEditingKey) return;
      if (confirm(`Remover a escala do dia ${editData.value}?`)) {
        delete scaleData[currentEditingKey];
        saveScaleData(scaleData);
        showToast('🗑️ Escala removida');
        closeModal();
        renderCalendar();
      }
    }

    // --- Sistema de senha ---
    function openPasswordOverlay() {
      passwordOverlay.classList.add('active');
      passwordInput.value = '';
      passwordError.classList.remove('show');
      passwordInput.focus();
    }

    function closePasswordOverlay() {
      passwordOverlay.classList.remove('active');
    }

    function verifyPassword() {
      const input = passwordInput.value;
      if (input === SENHA_ADMIN) {
        isUnlocked = true;
        updateLockUI();
        closePasswordOverlay();
        showToast('🔓 Edição liberada!');
        renderCalendar();
      } else {
        passwordError.classList.add('show');
        passwordInput.value = '';
        passwordInput.focus();
      }
    }

    // --- Navegação ---
    function goToPrevMonth() {
      if (currentMonth === 0) {
        currentMonth = 11;
        currentYear--;
      } else {
        currentMonth--;
      }
      renderCalendar();
    }

    function goToNextMonth() {
      if (currentMonth === 11) {
        currentMonth = 0;
        currentYear++;
      } else {
        currentMonth++;
      }
      renderCalendar();
    }

    function goToToday() {
      const now = new Date();
      currentYear = now.getFullYear();
      currentMonth = now.getMonth();
      renderCalendar();
    }

    // --- Eventos ---
    prevBtn.addEventListener('click', goToPrevMonth);
    nextBtn.addEventListener('click', goToNextMonth);
    goTodayBtn.addEventListener('click', goToToday);
    modalCloseBtn.addEventListener('click', closeModal);
    modalOverlay.addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });

    toggleLockBtn.addEventListener('click', function() {
      if (isUnlocked) {
        isUnlocked = false;
        updateLockUI();
        showToast('🔒 Edição bloqueada');
        renderCalendar();
      } else {
        openPasswordOverlay();
      }
    });

    passConfirm.addEventListener('click', verifyPassword);
    passCancel.addEventListener('click', closePasswordOverlay);
    passwordInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        verifyPassword();
      }
      if (e.key === 'Escape') {
        closePasswordOverlay();
      }
    });

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        if (passwordOverlay.classList.contains('active')) {
          closePasswordOverlay();
        }
        if (modalOverlay.classList.contains('active')) {
          closeModal();
        }
      }
      if (e.key === 'ArrowLeft' && !modalOverlay.classList.contains('active') && !passwordOverlay.classList.contains('active')) {
        e.preventDefault();
        goToPrevMonth();
      }
      if (e.key === 'ArrowRight' && !modalOverlay.classList.contains('active') && !passwordOverlay.classList.contains('active')) {
        e.preventDefault();
        goToNextMonth();
      }
    });

    scaleForm.addEventListener('submit', saveScale);
    deleteScaleBtn.addEventListener('click', deleteScale);

    // Inicializa
    const now = new Date();
    currentYear = now.getFullYear();
    currentMonth = now.getMonth();
    updateLockUI();
    renderCalendar();

  })();
</script>
</body>
</html>
